#
# Production-like profile for Railway/Render deployments.
#
# CORS:
# - Comma-separated list of origins or origin patterns.
# - If empty, backend only allows localhost for safety.
# Examples:
#   app.cors.origins=https://*.vercel.app,https://*.netlify.app
#   app.cors.origins=https://your-customer.vercel.app,https://your-admin.vercel.app
app.cors.origins=${APP_CORS_ORIGINS:}

# Profile "cloud" — Railway / Render / Docker
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
server.port=${PORT:8080}
app.seed.enabled=${APP_SEED_ENABLED:true}
app.seed.products=${APP_SEED_PRODUCTS:true}
# false in production: do not return reset code in API when email was sent successfully
app.reset.exposeToken=${RESET_EXPOSE_TOKEN:false}
