spring.application.name=Sales_Managment
spring.config.import=optional:classpath:application-local.properties,optional:file:./application-local.properties
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/web_is207?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:123456789}}
server.port=${PORT:8080}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT config (used by /api/auth/login + Bearer auth)
# Dev: secret mac dinh du 32+ ky tu (khong chua CHANGE_ME). Production: dat JWT_SECRET qua bien moi truong.
app.jwt.secret=${JWT_SECRET:is207-local-dev-jwt-secret-key-do-not-use-in-production-2026}
app.jwt.expiresMinutes=${JWT_EXPIRES_MINUTES:10080}

# Seed demo data (enable only for local/dev)
app.seed.enabled=${APP_SEED_ENABLED:false}
app.seed.products=${APP_SEED_PRODUCTS:false}
app.seed.productsCount=${APP_SEED_PRODUCTS_COUNT:100}
app.seed.fixProductImages=${APP_FIX_PRODUCT_IMAGES:true}

# Orders
app.order.shippingFee=${ORDER_SHIPPING_FEE:30000}

# Windows fix: avoid %TEMP% ownership issues for embedded Tomcat
server.tomcat.basedir=${TOMCAT_BASEDIR:./target/tomcat}
server.servlet.session.store-dir=${TOMCAT_SESSION_DIR:./target/tomcat/sessions}

# Forgot password / reset password
app.reset.exposeToken=${RESET_EXPOSE_TOKEN:false}
app.reset.expiresMinutes=${RESET_EXPIRES_MINUTES:15}

# Email: tao file application-local.properties (xem application-local.properties.example)
# Mailtrap (de) hoac Gmail App Password. Chua cau hinh -> ma hien tren man hinh web.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# true sau khi tao application-local.properties (xem file .example)
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:}
app.mail.fromName=${MAIL_FROM_NAME:IS207 Fashion}

# Uploads (product images)
app.upload.dir=${UPLOAD_DIR:./uploads}
app.upload.maxBytes=${UPLOAD_MAX_BYTES:5242880}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
